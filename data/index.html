<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monopoly Control</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div
      id="globalStatusBanner"
      class="global-status-banner hidden"
    >
      <div class="global-status-inner">
        <div class="global-status-text">
          <h3 id="globalStatusTitle"></h3>
          <p id="globalStatusMessage"></p>
        </div>
        <button
          id="globalStatusClose"
          class="global-status-close"
        >✕</button>
      </div>
    </div>

    <div
      id="cardPopupOverlay"
      class="card-popup-overlay hidden"
    >
      <div class="card-popup">
        <h2 id="cardPopupHeader"></h2>
        <p id="cardPopupText" class="card-popup-text"></p>
        <p id="cardPopupMeta" class="card-popup-meta"></p>
        <button
          id="cardPopupCloseBtn"
          class="card-popup-close-btn"
        >TUTUP</button>
      </div>
    </div>

    <div
      id="auctionOverlay"
      class="auction-overlay hidden"
    >
      <div class="auction-modal">
        <div class="auction-modal-header">
          <span class="auction-badge">🔨 LELANG</span>
          <span id="auctionTimer" class="auction-timer">30</span>
        </div>

        <div id="auctionPropertyCard" class="auction-property-card"></div>

        <div class="auction-highest">
          <span>TERTINGGI SAAT INI</span>
          <h2 id="auctionHighestBid">$0</h2>
          <p id="auctionHighestRole">Belum ada penawar</p>
        </div>

        <p id="auctionMyBalance" class="auction-my-balance"></p>

        <div id="auctionBidButtons" class="auction-bid-buttons"></div>

        <div id="auctionBankControls" class="auction-bank-controls hidden">
          <button id="auctionForceEndBtn" class="auction-force-end-btn">
            AKHIRI LELANG
          </button>
        </div>

        <div class="auction-history-title">RIWAYAT BID</div>
        <div id="auctionHistory" class="auction-history"></div>
      </div>
    </div>

    <div class="container">
      <header class="topbar">
        <h1>MONOPOLY CONTROL</h1>
        <p>ESP32 LOCAL CONTROL PANEL</p>
      </header>
      <main id="pageContainer"></main>
    </div>
    <script src="/js/state.js"></script>
    <script src="/js/globalStatus.js"></script>
    <script src="/js/cardPopup.js"></script>
    <script src="/js/pageManager.js"></script>
    <script src="/js/router.js"></script>
    <script src="/js/router/privateRouter.js"></script>
    <script src="/js/components/playerCard.js"></script>
    <script src="/js/components/propActions.js"></script>
    <script src="/pages/homePage.js"></script>
    <script src="/pages/logsPage.js"></script>
    <script src="/pages/settingsPage.js"></script>
    <script src="/pages/propertyPage.js"></script>
    <script src="/pages/myPropertyPage.js"></script>
    <script src="/pages/playerDashboard.js"></script>
    <script src="/pages/bankDashboard.js"></script>
    <script src="/pages/propertyManagerPage.js"></script>
    <script src="/pages/playerManagerPage.js"></script>
    <script src="/pages/transactionLogPage.js"></script>
    <script src="/pages/auctionPage.js"></script>
    <script src="/pages/transferPage.js"></script>
    <script src="/pages/transferController.js"></script>
    <script src="/js/sc/privateSocket.js"></script>
    <script src="/js/ws/socket.js"></script>
    <script src="/js/ws/socket_access.js"></script>
    <script src="/js/ws/socket_game.js"></script>
    <script src="/js/ws/socket_property.js"></script>
    <script src="/js/ws/socket_auction.js"></script>
    <script src="/js/ws/socket_log.js"></script>
    <script src="/js/ws/socket_ui.js"></script>
    <script src="/js/main.js"></script>
  </body>
</html>
